<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REQUIEM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #07070a;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #07070a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 999;
      transition: opacity 0.4s ease;
    }

    #loader.out {
      opacity: 0;
      pointer-events: none;
    }

    #loader-brand {
      font-size: 22px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #e0e0e0;
      font-weight: 300;
    }

    #loader-sub {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #555;
      text-transform: uppercase;
    }

    #loader-track {
      width: 320px;
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      position: relative;
      overflow: hidden;
      margin-top: 8px;
    }

    #loader-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 2px;
      background: rgba(255, 255, 255, 0.5);
      animation: sweep 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes sweep {
      0% {
        left: -40%;
        width: 40%;
      }

      60% {
        left: 100%;
        width: 40%;
      }

      100% {
        left: 100%;
        width: 40%;
      }
    }

    #loader-status {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: #444;
      text-transform: uppercase;
    }

    @media (orientation: portrait),
    (max-width: 640px) {
      #orientation-warning {
        display: flex !important;
      }

      canvas {
        display: none !important;
      }
    }

    #orientation-warning {
      position: fixed;
      inset: 0;
      background: #07070a;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      color: #888;
      text-align: center;
      padding: 20px;
    }

    #orientation-warning h2 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #aaa;
    }

    #orientation-warning p {
      font-size: 13px;
      opacity: 0.6;
      max-width: 280px;
    }
  </style>
</head>

<body>
  <div id="loader">
    <div id="loader-brand">Requiem</div>
    <div id="loader-sub">Journey Engine</div>
    <div id="loader-track">
      <div id="loader-bar"></div>
    </div>
    <div id="loader-status">initializing…</div>
  </div>
  <div id="orientation-warning">
    <h2>Rotate Device</h2>
    <p>Landscape mode required for this experience.</p>
  </div>
  <script type="module">
    const LOCAL = './pkg/requiem.js';
    const CDN   = 'https://cdn.jsdelivr.net/npm/@ujjwalvivek/requiem@latest/requiem.js';
    const status = document.getElementById('loader-status');
    try {
      status.textContent = 'loading wasm…';
      let mod;
      try {
        const probe = await fetch(LOCAL, { method: 'HEAD' });
        if (!probe.ok) throw 0;
        mod = await import(LOCAL);
      } catch {
        mod = await import(CDN);
      }
      status.textContent = 'starting engine…';
      await mod.default();
      const loader = document.getElementById('loader');
      if (loader) {
        loader.classList.add('out');
        setTimeout(() => loader.remove(), 450);
      }
    } catch (e) {
      status.textContent = 'failed, see console';
      console.error('Requiem boot failed:', e);
    }
  </script>
  <script>
    new ResizeObserver(function () {
      window.dispatchEvent(new Event('resize'));
    }).observe(document.documentElement);
  </script>
</body>

</html>
